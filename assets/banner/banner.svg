<svg width="1000" height="250" viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="250" fill="url(#bgGrad)" />
  <rect width="1000" height="250" fill="url(#grid)" />

  <!-- Abstract Spatial Geometry (Right Side) -->
  <g opacity="0.4" transform="translate(700, 125)">
    <!-- Simulated Visium Spots -->
    <circle cx="0" cy="0" r="40" fill="url(#accentGrad)" opacity="0.8" filter="blur(10px)" />
    <circle cx="60" cy="-30" r="25" fill="#EC4899" opacity="0.6" filter="blur(8px)" />
    <circle cx="-50" cy="50" r="30" fill="#4F46E5" opacity="0.7" filter="blur(8px)" />
    <circle cx="80" cy="60" r="20" fill="#F59E0B" opacity="0.5" filter="blur(5px)" />
    <circle cx="-70" cy="-60" r="20" fill="#14B8A6" opacity="0.5" filter="blur(5px)" />
    
    <!-- Connectivity Lines -->
    <path d="M0,0 L60,-30 M0,0 L-50,50 M0,0 L80,60 M0,0 L-70,-60 M60,-30 L80,60 M-50,50 L-70,-60" 
          stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5" />
  </g>

  <!-- Title Text -->
  <g transform="translate(80, 110)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-1">
      SpatialAIFlow
    </text>
    <!-- Subtitle -->
    <text x="5" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="400" font-size="22" fill="#94a3b8" letter-spacing="0.5">
      End-to-End Educational Pipeline for Spatial Transcriptomics
    </text>
  </g>

  <!-- Bottom Accent Bar -->
  <rect x="0" y="245" width="1000" height="5" fill="url(#accentGrad)" />
</svg>
