# ==============================================================================
# SpatialAIFlow — Conda Environment
# ==============================================================================
# Create with:   conda env create -f environment.yml
# Activate:      conda activate spatialaiflow
# Update:        conda env update -f environment.yml --prune
# ==============================================================================

name: spatialaiflow
channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python>=3.9,<3.13

  # Core scientific stack
  - numpy>=1.23
  - pandas>=1.5
  - matplotlib>=3.6

  # Single-cell / spatial ecosystem
  - anndata>=0.9
  - scanpy>=1.9
  - squidpy>=1.3

  # Jupyter (for running notebooks)
  - jupyterlab>=4.0
  - ipykernel>=6.0

  # Development tools
  - pytest>=7.0
  - pytest-cov>=4.0

  # pip-only packages (not available on conda-forge)
  - pip:
      - liana>=1.0
      - gseapy>=1.0
      - celltypist>=1.5
      - tangram-sc>=1.0
      - scikit-learn>=1.2
      - ruff>=0.4
      - mypy>=1.5
      - pre-commit>=3.0
